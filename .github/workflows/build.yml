name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MT5 Portable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process -FilePath.\mt5setup.exe -ArgumentList "/auto","/portable","/path:C:\mt5" -Wait
          Start-Sleep -Seconds 45
          
      - name: Debug and Compile
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "=== DEBUG: Listing C:\mt5 ==="
          Get-ChildItem C:\mt5 -Recurse | Select-Object FullName, Length
          
          Write-Host "=== DEBUG: Testing metaeditor64.exe ==="
          & "C:\mt5\metaeditor64.exe" /? 
          
          Write-Host "=== COMPILING ==="
          New-Item -ItemType Directory -Force -Path C:\mt5\MQL5\Experts
          Copy-Item "$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" -Destination "C:\mt5\MQL5\Experts\" -Force
          
          Set-Location C:\mt5
          &.\metaeditor64.exe /compile:".\MQL5\Experts\XAU_3_6_Best.mq5" /log:".\compile.log"
          
          Write-Host "=== COMPILE LOG START ==="
          Get-Content.\compile.log -ErrorAction Continue
          Write-Host "=== COMPILE LOG END ==="
          
          Write-Host "=== CHECKING FOR EX5 ==="
          Get-ChildItem C:\mt5 -Recurse -Filter *.ex5
          
      - name: Upload EX5
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: C:\mt5\MQL5\Experts\XAU_3_6_Best.ex5
          if-no-files-found: warn
