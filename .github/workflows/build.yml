name: Build EA
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile MQL5
        uses: docker://ghcr.io/fx31337/mql5-compiler:latest
        with:
          args: XAU_3_6_Best.mq5
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best
          path: XAU_3_6_Best.ex5
