name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download & Install MT5
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process.\mt5setup.exe -ArgumentList "/auto","/portable" -Wait -PassThru
          Start-Sleep -Seconds 30
          
      - name: Compile EA
        shell: pwsh
        continue-on-error: true
        run: |
          $mt5path = "C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal\*\metaeditor64.exe"
          $editor = Resolve-Path $mt5path
          & $editor /compile:"$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" /log:"$env:GITHUB_WORKSPACE\compile.log"
          Write-Host "=== COMPILE LOG START ==="
          Get-Content compile.log -ErrorAction SilentlyContinue
          Write-Host "=== COMPILE LOG END ==="
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: Experts\XAU_3_6_Best.ex5
