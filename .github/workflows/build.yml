name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download MT5 Portable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/JetMuffin/MetaTrader5-Portable/releases/download/v5.0.36/MetaTrader5.zip" -OutFile mt5.zip
          Expand-Archive mt5.zip -DestinationPath C:\mt5
          
      - name: Compile
        shell: pwsh
        run: |
          Write-Host "=== Files in C:\mt5 ==="
          Get-ChildItem C:\mt5 -Recurse -Name
          
          New-Item -ItemType Directory -Force -Path C:\mt5\MQL5\Experts
          Copy-Item "$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" -Destination "C:\mt5\MQL5\Experts\" -Force
          
          Set-Location C:\mt5
          &.\metaeditor64.exe /compile:".\MQL5\Experts\XAU_3_6_Best.mq5" /log:".\compile.log"
          
          Write-Host "=== COMPILE LOG START ==="
          Get-Content.\compile.log -ErrorAction Continue
          Write-Host "=== COMPILE LOG END ==="
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: C:\mt5\MQL5\Experts\XAU_3_6_Best.ex5
