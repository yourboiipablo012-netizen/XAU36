name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MT5
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process -FilePath.\mt5setup.exe -ArgumentList "/auto","/portable" -Wait
          Start-Sleep -Seconds 45
          
      - name: Compile
        shell: pwsh
        run: |
          $terminal = Get-ChildItem "C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal" -Directory | Select-Object -First 1
          $editor = Join-Path $terminal.FullName "metaeditor64.exe"
          Write-Host "Editor path: $editor"
          & $editor /compile:"$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" /log:"$env:GITHUB_WORKSPACE\compile.log"
          Write-Host "=== COMPILE LOG START ==="
          Get-Content compile.log -ErrorAction Continue
          Write-Host "=== COMPILE LOG END ==="
          Get-ChildItem -Path. -Recurse -Filter *.ex5 | ForEach-Object { Write-Host "Found EX5: $($_.FullName)" }
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: |
            *.ex5
            **\*.ex5
