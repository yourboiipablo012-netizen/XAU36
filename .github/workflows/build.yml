name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MT5 Portable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process -FilePath.\mt5setup.exe -ArgumentList "/auto","/portable","/path:C:\mt5" -Wait
          Start-Sleep -Seconds 30
          
      - name: Compile
        shell: pwsh
        run: |
          $editor = "C:\mt5\metaeditor64.exe"
          Write-Host "Editor path: $editor"
          & $editor /compile:"$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" /log:"$env:GITHUB_WORKSPACE\compile.log" /include:"C:\mt5\MQL5"
          Write-Host "=== COMPILE LOG START ==="
          Get-Content compile.log
          Write-Host "=== COMPILE LOG END ==="
          Get-ChildItem -Path C:\mt5 -Recurse -Filter *.ex5 | ForEach-Object { Copy-Item $_.FullName -Destination $env:GITHUB_WORKSPACE }
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: XAU_3_6_Best.ex5
