name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile EA
        uses: ea31337/mql-compile-action@v1
        with:
          path: XAU_3_6_Best.mq5
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: XAU_3_6_Best.ex5
