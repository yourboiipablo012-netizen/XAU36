name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download & Setup MT5
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5clw64.zip" -OutFile mt5.zip
          Expand-Archive mt5.zip -DestinationPath C:\mt5
          mkdir C:\mt5\MQL5\Experts
          Copy-Item XAU_3_6_Best.mq5 C:\mt5\MQL5\Experts\ -Force
          
      - name: Compile EA
        shell: pwsh
        continue-on-error: true
        run: |
          C:\mt5\metaeditor64.exe /compile:"C:\mt5\MQL5\Experts\XAU_3_6_Best.mq5" /log:"C:\mt5\compile.log"
          Write-Host "=== COMPILE LOG START ==="
          Get-Content C:\mt5\compile.log -ErrorAction SilentlyContinue
          Write-Host "=== COMPILE LOG END ==="
          
      - name: Check Result
        run: |
          if (Test-Path C:\mt5\MQL5\Experts\XAU_3_6_Best.ex5) {
            echo "SUCCESS: EX5 FOUND"
          } else {
            echo "FAILED: No EX5 file"
            exit 1
          }
          
      - name: Upload EX5
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: C:\mt5\MQL5\Experts\XAU_3_6_Best.ex5
