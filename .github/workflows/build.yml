name: Build MQL5
on: [push]
jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MT5 Portable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process -FilePath.\mt5setup.exe -ArgumentList "/auto","/portable","/path:C:\mt5" -Wait
          Start-Sleep -Seconds 30
          
      - name: Compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\mt5\MQL5\Experts
          Copy-Item "$env:GITHUB_WORKSPACE\XAU_3_6_Best.mq5" -Destination "C:\mt5\MQL5\Experts\" -Force
          
          $editor = "C:\mt5\metaeditor64.exe"
          $mq5path = "C:\mt5\MQL5\Experts\XAU_3_6_Best.mq5"
          $logpath = "C:\mt5\MQL5\Experts\XAU_3_6_Best.log"
          
          & $editor /compile:"$mq5path" /log:"$logpath"
          
          Write-Host "=== COMPILE LOG START ==="
          Get-Content $logpath -ErrorAction Continue
          Write-Host "=== COMPILE LOG END ==="
          
          Copy-Item "C:\mt5\MQL5\Experts\XAU_3_6_Best.ex5" -Destination $env:GITHUB_WORKSPACE -ErrorAction SilentlyContinue
          
      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: XAU_3_6_Best-ex5
          path: XAU_3_6_Best.ex5
